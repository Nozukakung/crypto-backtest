# config/strategy.yaml — ตาเล็กจริง RSI Only + พอร์ต $50K ค้ำ Cross Margin
strategy:
  name: "Mean Reversion + DCA (ตาเล็ก RSI Only)"
  type: "crypto_futures"
  timeframe: "1m"
  initial_capital: 50000.0          # พอร์ต $50K ตามตาเล็ก
  leverage: 10
  size_per_trade_usd: 200.0         # ไม้ละ $200
  max_positions: 1

signal:
  rsi_period: 14
  rsi_long_threshold: 40.0         # ปล่อยกว้างขึ้น
  rsi_short_threshold: 60.0        # ปล่อยกว้างขึ้น

order:
  price_offset_percent: 0.05
  fee_rate_maker: 0.02
  fee_rate_taker: 0.045

  take_profit_above_bep_percent: 0.2   # TP 0.2%

position:
  dca_trigger_below_bep_percent: 0.3
  dca_multiplier: 1.0
  dca_max_cap_usd: 50000.0         # Cap $50K (margin $5,000 ที่ 10x)
  long_timeout_minutes: 30          # LONG: หยุดถัว 30 นาที (มัดรวม)
  short_timeout_minutes: 120        # SHORT: หยุดถัว 120 นาที (มัดรวม)
  cutloss_after_stop_minutes: 9999999  # ปิด Cut Loss (ไม่ตัดขาดทุน)
  monitor_interval_minutes: 5
  cooldown_minutes: 5
  funding_rate_per_8h: 0.01

risk:
  max_position_per_pair: 50000.0
  max_drawdown_alert_percent: 30.0
