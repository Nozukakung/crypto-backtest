# config/strategy.yaml — พารามิเตอร์กลยุทธ์ (ตาเล็กจริงจากข่าว)
strategy:
  name: "Mean Reversion + DCA (ตาเล็กจริง)"
  type: "crypto_futures"
  timeframe: "1m"
  initial_capital: 10000.0          # ทุนเริ่มต้น (USD)
  leverage: 10                      # Leverage 10x (ตาเล็กจริง)
  size_per_trade_usd: 200.0         # $200/ไม้ (ตาเล็กจริง)
  max_positions: 1                  # เปิดพร้อมกันได้สูงสุด

signal:
  rsi_period: 14
  rsi_long_threshold: 35.0          # ลดอีก 5% (ตาเล็กปรับล่าสุด)
  rsi_short_threshold: 65.0         # ลดอีก 5% (ตาเล็กปรับล่าสุด)
  max_consecutive_high: 5
  avoid_touch_pattern: true

order:
  type: "limit"
  price_offset_percent: 0.05
  fee_rate_maker: 0.02
  fee_rate_taker: 0.045
  rebalance_interval_minutes: 1

position:
  stop_loss_percent: 0.0            # ไม่มี SL
  take_profit_above_bep_percent: 0.2    # TP = BEP + 0.2%
  dca_trigger_below_bep_percent: 0.3    # DCA 0.3% (สูตรเดิม)
  dca_multiplier: 1.0
  dca_max_cap_usd: 20000.0              # Cap $20K (ตาเล็กใช้ $20K)
  long_timeout_minutes: 30
  short_timeout_minutes: 120
  cooldown_minutes: 5
  funding_rate_per_8h: 0.01

risk:
  max_position_per_pair: 20000.0
  max_drawdown_alert_percent: 30.0