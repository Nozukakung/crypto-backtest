# config/strategy.yaml
strategy:
  name: "DCA Short Only Martingale"
  type: "crypto_futures"
  timeframe: "1m"
  initial_capital: 10000.0          # ทุนเริ่มต้น (USD)
  leverage: 3                       # Leverage 3x (Futures)
  size_per_trade_usd: 100.0         # เริ่มต้นไม้ละ $100 (เท่า min_notional)
  max_positions: 1                  # เปิดพร้อมกันได้สูงสุด

signal:
  rsi_period: 14
  rsi_long_threshold: 40.0
  rsi_short_threshold: 60.0
  max_consecutive_high: 5
  max_consecutive_low: 5
  avoid_touch_pattern: true
  score_range_low: 0.3
  score_range_high: 0.7

order:
  type: "limit"                      # Maker order (รอคิว)
  price_offset_percent: 0.05         # ห่างตลาด 0.05%
  fee_rate_maker: 0.02               # Maker fee 0.02%
  timeout_seconds: 60

position:
  take_profit_above_bep_percent: 0.2    # TP = BEP + 0.2%
  dca_trigger_below_bep_percent: 0.3    # DCA base distance 0.3%
  dca_multiplier: 1.0                   # Fixed spacing (Dynamic = body)
  dca_max_cap_usd: 50000.0              # เพดาน $50K (ตาเล็ก)
  dca_size_mode: "fixed"              # Fixed $100 ทุกไม้
  short_timeout_minutes: 120
  long_timeout_minutes: 30
  monitor_interval_minutes: 5
  cooldown_minutes: 5
  funding_rate_per_8h: 0.01